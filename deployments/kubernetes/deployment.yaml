# Kubernetes Deployment 配置
# 定义应用部署策略
#
# 创建方式：
#   kubectl apply -f deployments/kubernetes/deployment.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-gin
  namespace: default
  labels:
    app: my-gin
    version: v1
spec:
  # 副本数
  replicas: 3

  # 部署策略
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  # 选择器
  selector:
    matchLabels:
      app: my-gin

  # Pod 模板
  template:
    metadata:
      labels:
        app: my-gin
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"

    spec:
      # 容器配置
      containers:
      - name: app
        image: my-gin:v1.0.0
        imagePullPolicy: IfNotPresent

        # 端口配置
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        # 环境变量 - 从 ConfigMap 读取
        envFrom:
        - configMapRef:
            name: my-gin-config

        # 环境变量 - 从 Secret 读取敏感信息
        env:
        - name: APP_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: my-gin-secret
              key: jwt-secret
        - name: APP_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: my-gin-secret
              key: db-password
        - name: APP_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: my-gin-secret
              key: redis-password

        # 资源限制
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi

        # 存活探针
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        # 就绪探针
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        # 启动探针
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12

        # 生命周期钩子
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 5"]

        # 优雅关闭
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File

      # 优雅关闭时间
      terminationGracePeriodSeconds: 30

      # DNS 策略
      dnsPolicy: ClusterFirst

      # 重启策略
      restartPolicy: Always