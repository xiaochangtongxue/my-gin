# Kubernetes ConfigMap 配置
# 存储非敏感的配置信息
#
# 创建方式：
#   kubectl apply -f deployments/kubernetes/configmap.yaml

apiVersion: v1
kind: ConfigMap
metadata:
  name: my-gin-config
  namespace: default
data:
  # 运行环境
  APP_ENV: "prod"

  # 数据库配置
  APP_DATABASE_HOST: "mysql-service"
  APP_DATABASE_PORT: "3306"
  APP_DATABASE_USERNAME: "root"
  APP_DATABASE_NAME: "my_app_db"

  # Redis 配置
  APP_REDIS_HOST: "redis-service:6379"

  # 服务器配置
  APP_SERVER_MODE: "release"
  APP_SERVER_HOST: "0.0.0.0"
  APP_SERVER_PORT: "8080"