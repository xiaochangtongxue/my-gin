# Kubernetes Secret 配置
# 存储敏感信息（密钥、密码等）
#
# 创建方式：
#   kubectl apply -f deployments/kubernetes/secret.yaml
#
# 或者使用 kubectl 命令创建：
#   kubectl create secret generic my-gin-secret \
#     --from-literal=jwt-secret='your-jwt-secret' \
#     --from-literal=db-password='your-db-password' \
#     --from-literal=redis-password='your-redis-password'

apiVersion: v1
kind: Secret
metadata:
  name: my-gin-secret
  namespace: default
type: Opaque
# 注意：生产环境应该使用 kubectl create secret 或 SealedSecret
# 这里使用 stringData 仅用于示例，实际部署时应替换为真实的密钥
stringData:
  # JWT 密钥（至少32位）
  # 生成方法: openssl rand -base64 32
  jwt-secret: "change-me-in-production-use-openssl-rand-base64-32"

  # 数据库密码
  db-password: "change-me-in-production"

  # Redis 密码（如果 Redis 无密码可留空）
  redis-password: ""