definitions:
  github_com_xiaochangtongxue_my-gin_internal_dto_req.RefreshTokenReq:
    properties:
      refresh_token:
        description: Refresh Token
        type: string
    required:
    - refresh_token
    type: object
  github_com_xiaochangtongxue_my-gin_internal_dto_resp.Check:
    description: 组件健康状态
    properties:
      error:
        description: 错误信息
        type: string
      latency:
        description: 响应耗时（毫秒）
        example: 5
        type: integer
      status:
        description: up, down, degraded
        example: up
        type: string
    type: object
  github_com_xiaochangtongxue_my-gin_internal_dto_resp.CheckResponse:
    description: 简化版健康检查响应
    properties:
      status:
        example: ok
        type: string
      time:
        example: 2025-01-02T15:04:05Z07:00
        type: string
    type: object
  github_com_xiaochangtongxue_my-gin_internal_dto_resp.ReadyResponse:
    description: 完整版健康检查响应（包含各组件状态）
    properties:
      checks:
        additionalProperties:
          $ref: '#/definitions/github_com_xiaochangtongxue_my-gin_internal_dto_resp.Check'
        type: object
      status:
        example: healthy
        type: string
      timestamp:
        example: 2025-01-02T15:04:05Z07:00
        type: string
      version:
        example: 1.0.0
        type: string
    type: object
  github_com_xiaochangtongxue_my-gin_internal_service.TokenPair:
    description: 双 Token 响应（Access Token + Refresh Token）
    properties:
      access_token:
        description: Access Token
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        description: Access Token 过期时间（秒）
        example: 1800
        type: integer
      refresh_token:
        description: Refresh Token
        example: a1b2c3d4e5f6...
        type: string
    type: object
  github_com_xiaochangtongxue_my-gin_pkg_response.Response:
    description: 统一 API 响应格式
    properties:
      code:
        description: 业务状态码
        example: 0
        type: integer
      data:
        description: 响应数据
      message:
        description: 响应消息
        example: success
        type: string
      request_id:
        description: 请求ID
        example: abc123
        type: string
      timestamp:
        description: 时间戳
        example: 1704067200
        type: integer
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
    url: http://www.example.com/support
  description: 生产级 Gin 框架脚手架 API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: My-Gin API
  version: "1.0"
paths:
  /api/v1/logout:
    post:
      consumes:
      - application/json
      description: 删除 Refresh Token 并将 Access Token 加入黑名单
      parameters:
      - description: 登出请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_xiaochangtongxue_my-gin_internal_dto_req.RefreshTokenReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_xiaochangtongxue_my-gin_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 用户登出
      tags:
      - 认证
  /api/v1/logout/all:
    post:
      description: 删除用户的所有 Refresh Token 并将当前 Access Token 加入黑名单
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_xiaochangtongxue_my-gin_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: 登出所有设备
      tags:
      - 认证
  /api/v1/refresh:
    post:
      consumes:
      - application/json
      description: 使用 Refresh Token 获取新的 Access Token
      parameters:
      - description: 刷新请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_xiaochangtongxue_my-gin_internal_dto_req.RefreshTokenReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_xiaochangtongxue_my-gin_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_xiaochangtongxue_my-gin_internal_service.TokenPair'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_xiaochangtongxue_my-gin_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_xiaochangtongxue_my-gin_pkg_response.Response'
      summary: 刷新 Access Token
      tags:
      - 认证
  /health:
    get:
      consumes:
      - application/json
      description: 检查服务运行状态（仅返回基本状态）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_xiaochangtongxue_my-gin_internal_dto_resp.CheckResponse'
      summary: 健康检查
      tags:
      - 健康
  /health/live:
    get:
      consumes:
      - application/json
      description: 检查服务是否存活（轻量级，不检查依赖）
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_xiaochangtongxue_my-gin_internal_dto_resp.CheckResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/github_com_xiaochangtongxue_my-gin_internal_dto_resp.CheckResponse'
      summary: 存活检查
      tags:
      - 健康
  /health/ready:
    get:
      consumes:
      - application/json
      description: 检查服务及其依赖（数据库、Redis）的就绪状态
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_xiaochangtongxue_my-gin_internal_dto_resp.ReadyResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/github_com_xiaochangtongxue_my-gin_internal_dto_resp.ReadyResponse'
      summary: 就绪检查
      tags:
      - 健康
  /swagger/index.html:
    get:
      consumes:
      - application/json
      description: 访问 Swagger API 文档界面
      produces:
      - application/json
      responses: {}
      summary: Swagger API 文档
      tags:
      - 文档
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
