# Docker Compose 完整版配置
# 包含应用、MySQL、Redis 三个服务
# 使用方法：
#   1. 复制 .env.example 为 .env 并填入实际值
#   2. docker-compose -f build/docker/docker-compose-full.yml up -d

services:
  # ========================================
  # MySQL 数据库
  # ========================================
  mysql:
    image: mysql:8.0
    container_name: my-gin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-my_app_db}
      MYSQL_USER: ${MYSQL_USERNAME:-app_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app_password}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - my-gin-network

  # ========================================
  # Redis 缓存
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: my-gin-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: >
      sh -c '
      if [ -n "${REDIS_PASSWORD:-}" ]; then
        redis-server --requirepass "$${REDIS_PASSWORD}" --appendonly yes
      else
        redis-server --appendonly yes
      fi
      '
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - my-gin-network

  # ========================================
  # 应用服务
  # ========================================
  app:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile
    container_name: my-gin-app
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_DATABASE_HOST: mysql
      APP_DATABASE_PORT: 3306
      APP_DATABASE_USERNAME: ${MYSQL_USERNAME:-root}
      APP_DATABASE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      APP_DATABASE_NAME: ${MYSQL_DATABASE:-my_app_db}
      APP_REDIS_HOST: redis:6379
      APP_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      APP_SERVER_MODE: ${APP_SERVER_MODE:-debug}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - my-gin-network


# ========================================
# 数据卷
# ========================================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

# ========================================
# 网络
# ========================================
networks:
  my-gin-network:
    driver: bridge